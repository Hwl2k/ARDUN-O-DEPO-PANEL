<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Arduino Depo Panel</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#0b1220;color:#e5e7eb}
.app{display:flex;min-height:100vh}
.sidebar{width:250px;background:#020617;border-right:1px solid #1e293b;padding:22px;position:fixed;height:100vh}
.logo{font-size:24px;font-weight:bold;color:#38bdf8;margin-bottom:30px}
.menu button{width:100%;padding:14px;margin:7px 0;border:0;border-radius:12px;background:transparent;color:#cbd5e1;text-align:left;cursor:pointer;font-size:15px}
.menu button.active,.menu button:hover{background:#2563eb;color:white}
.main{margin-left:250px;width:calc(100% - 250px);padding:25px}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:25px}
.topbar h1{font-size:28px}
.search{padding:13px 16px;border-radius:12px;border:1px solid #334155;background:#020617;color:white;width:280px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-bottom:25px}
.card{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:22px;box-shadow:0 0 25px rgba(37,99,235,.12)}
.card span{color:#94a3b8}
.card h2{font-size:32px;margin-top:10px;color:#38bdf8}
.grid{display:grid;grid-template-columns:1.1fr 1.9fr;gap:20px}
.panel{background:#111827;border:1px solid #1e293b;border-radius:18px;padding:22px;margin-bottom:22px}
.panel h3{margin-bottom:16px}
.form input,.form select{width:100%;margin-bottom:12px;padding:13px;border-radius:12px;border:1px solid #334155;background:#020617;color:white}
.btn{background:#2563eb;color:white;border:0;border-radius:12px;padding:12px 16px;cursor:pointer;font-weight:bold}
.btn.green{background:#16a34a}
.btn.red{background:#dc2626}
.btn.dark{background:#334155}
table{width:100%;border-collapse:collapse}
th,td{padding:14px;border-bottom:1px solid #1e293b;text-align:left}
th{color:#94a3b8;font-size:14px}
.product{display:flex;align-items:center;gap:12px}
.product img{width:55px;height:55px;border-radius:12px;object-fit:cover;background:white}
.badge{padding:6px 12px;border-radius:999px;font-size:13px;font-weight:bold}
.normal{background:rgba(34,197,94,.15);color:#86efac}
.low{background:rgba(239,68,68,.15);color:#fca5a5}
.medium{background:rgba(234,179,8,.15);color:#fde68a}
.actions button{margin:2px;padding:8px 11px;border:0;border-radius:10px;cursor:pointer;color:white}
.alert{padding:12px;border-radius:12px;background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.35);margin-bottom:10px;color:#fecaca}
.empty{color:#94a3b8;padding:20px}
@media(max-width:900px){
.sidebar{position:relative;width:100%;height:auto}
.app{display:block}
.main{margin-left:0;width:100%}
.cards,.grid{grid-template-columns:1fr}
.topbar{flex-direction:column;align-items:flex-start;gap:12px}
.search{width:100%}
}
</style>
</head>

<body>
<div class="app">

<aside class="sidebar">
  <div class="logo">⚡ ArduinoDepo</div>
  <div class="menu">
    <button class="active">Dashboard</button>
    <button>Ürünler</button>
    <button>Kategoriler</button>
    <button>Sorgu Yap</button>
    <button>Stok Hareketleri</button>
    <button>Ayarlar</button>
  </div>
</aside>

<main class="main">

  <div class="topbar">
    <h1>Arduino Proje Stok Takip</h1>
    <input id="searchInput" class="search" placeholder="Ürün sorgula...">
  </div>

  <section class="cards">
    <div class="card"><span>Toplam Ürün</span><h2 id="totalProducts">0</h2></div>
    <div class="card"><span>Toplam Stok</span><h2 id="totalStock">0</h2></div>
    <div class="card"><span>Düşük Stok</span><h2 id="lowStock">0</h2></div>
    <div class="card"><span>Kategori</span><h2 id="totalCategory">0</h2></div>
  </section>

  <div class="grid">

    <section class="panel">
      <h3>Yeni Ürün Ekle</h3>

      <div class="form">
        <input id="name" placeholder="Ürün adı">
        <input id="category" placeholder="Kategori">
        <input id="stock" type="number" placeholder="Stok adedi">
        <input id="minStock" type="number" placeholder="Minimum stok">
        <input id="price" type="number" placeholder="Birim fiyat">
        <input id="image" placeholder="Ürün resmi linki">
        <button class="btn" onclick="addProduct()">Ürün Ekle</button>
      </div>
    </section>

    <section class="panel">
      <h3>Düşük Stok Uyarıları</h3>
      <div id="alerts"></div>
    </section>

  </div>

  <section class="panel">
    <h3>Ürün Listesi</h3>

    <table>
      <thead>
        <tr>
          <th>Ürün</th>
          <th>Kategori</th>
          <th>Stok</th>
          <th>Min</th>
          <th>Fiyat</th>
          <th>Durum</th>
          <th>İşlem</th>
        </tr>
      </thead>
      <tbody id="productTable"></tbody>
    </table>
  </section>

</main>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [
  {
    name:"Arduino Uno R3",
    category:"Arduino Kartları",
    stock:12,
    minStock:5,
    price:299,
    image:"https://upload.wikimedia.org/wikipedia/commons/3/38/Arduino_Uno_-_R3.jpg"
  },
  {
    name:"Arduino Nano",
    category:"Arduino Kartları",
    stock:4,
    minStock:8,
    price:249,
    image:"https://upload.wikimedia.org/wikipedia/commons/thumb/0/0d/Arduino_Nano.jpg/320px-Arduino_Nano.jpg"
  },
  {
    name:"HC-SR04 Ultrasonik Sensör",
    category:"Sensörler",
    stock:3,
    minStock:10,
    price:39,
    image:"https://upload.wikimedia.org/wikipedia/commons/7/76/HC-SR04.jpg"
  },
  {
    name:"SG90 Servo Motor",
    category:"Motorlar",
    stock:15,
    minStock:6,
    price:59,
    image:"https://upload.wikimedia.org/wikipedia/commons/thumb/3/3b/Servo_Motor_SG90.jpg/320px-Servo_Motor_SG90.jpg"
  }
];

function save(){
  localStorage.setItem("products", JSON.stringify(products));
}

function statusClass(p){
  if(p.stock <= p.minStock) return "low";
  if(p.stock <= p.minStock * 2) return "medium";
  return "normal";
}

function statusText(p){
  if(p.stock <= p.minStock) return "Düşük";
  if(p.stock <= p.minStock * 2) return "Orta";
  return "Normal";
}

function render(){
  const search = document.getElementById("searchInput").value.toLowerCase();
  const table = document.getElementById("productTable");
  const alerts = document.getElementById("alerts");

  const filtered = products.filter(p =>
    p.name.toLowerCase().includes(search) ||
    p.category.toLowerCase().includes(search)
  );

  table.innerHTML = "";

  if(filtered.length === 0){
    table.innerHTML = `<tr><td colspan="7" class="empty">Ürün bulunamadı.</td></tr>`;
  }

  filtered.forEach((p, i) => {
    table.innerHTML += `
      <tr>
        <td>
          <div class="product">
            <img src="${p.image}" onerror="this.src='https://via.placeholder.com/80'">
            <strong>${p.name}</strong>
          </div>
        </td>
        <td>${p.category}</td>
        <td>${p.stock}</td>
        <td>${p.minStock}</td>
        <td>₺${p.price}</td>
        <td><span class="badge ${statusClass(p)}">${statusText(p)}</span></td>
        <td class="actions">
          <button class="btn green" onclick="increase(${i})">+</button>
          <button class="btn dark" onclick="decrease(${i})">-</button>
          <button class="btn red" onclick="removeProduct(${i})">Sil</button>
        </td>
      </tr>
    `;
  });

  const totalStock = products.reduce((sum,p)=>sum + Number(p.stock),0);
  const lowStock = products.filter(p=>p.stock <= p.minStock).length;
  const categories = new Set(products.map(p=>p.category));

  document.getElementById("totalProducts").innerText = products.length;
  document.getElementById("totalStock").innerText = totalStock;
  document.getElementById("lowStock").innerText = lowStock;
  document.getElementById("totalCategory").innerText = categories.size;

  alerts.innerHTML = "";
  const lowItems = products.filter(p=>p.stock <= p.minStock);

  if(lowItems.length === 0){
    alerts.innerHTML = `<div class="empty">Şu an düşük stok yok.</div>`;
  } else {
    lowItems.forEach(p=>{
      alerts.innerHTML += `<div class="alert">${p.name} az kaldı. Stok: ${p.stock}</div>`;
    });
  }
}

function addProduct(){
  const name = document.getElementById("name").value;
  const category = document.getElementById("category").value;
  const stock = Number(document.getElementById("stock").value);
  const minStock = Number(document.getElementById("minStock").value);
  const price = Number(document.getElementById("price").value);
  const image = document.getElementById("image").value;

  if(!name || !category || !stock || !minStock || !price){
    alert("Boş alan bırakma.");
    return;
  }

  products.push({
    name,
    category,
    stock,
    minStock,
    price,
    image: image || "https://via.placeholder.com/80"
  });

  document.querySelectorAll(".form input").forEach(input => input.value = "");
  save();
  render();
}

function increase(i){
  products[i].stock++;
  save();
  render();
}

function decrease(i){
  if(products[i].stock > 0){
    products[i].stock--;
    save();
    render();
  }
}

function removeProduct(i){
  if(confirm("Bu ürünü silmek istiyor musun?")){
    products.splice(i,1);
    save();
    render();
  }
}

document.getElementById("searchInput").addEventListener("input", render);
render();
</script>

</body>
</html>
